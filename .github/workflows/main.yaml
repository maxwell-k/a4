on: push # yamllint disable-line rule:truthy

permissions: {}

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with: { persist-credentials: false }
      - uses: fsfe/reuse-action@676e2d560c9a403aa252096d99fcab3e1132b0f5 # v6
      - run: yamllint --version && yamllint .github
      # yamllint disable-line rule:line-length
      - uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with: { deno-version: v2.9.4 } # see .renovaterc.json
      - run: deno task check
      - run: deno install
      - run: curl --silent --remote-name http://example.org/index.html
      # https://chromium.googlesource.com/chromium/src/+/main/docs/security/apparmor-userns-restrictions.md#option-1_the-easiest-way
      # https://github.com/puppeteer/puppeteer/blob/main/.github/workflows/ci.yml#L198C9-L198C86
      - run: >-
          echo 0
          | sudo tee /proc/sys/kernel/apparmor_restrict_unprivileged_userns
      - run: >-
          deno
          run
          --allow-net
          --allow-run
          --allow-read
          --allow-write
          --allow-env
          a4.ts
          index.html
      - run: >-
          deno
          run
          --allow-env
          --allow-read
          --allow-ffi
          --allow-sys
          is-a4.ts
          index.pdf
      - run: >-
          deno
          compile
          --allow-env
          --allow-read
          --allow-write
          --allow-run
          --allow-net
          a4.ts
      - run: sha256sum a4 | tee SHA256SUMS
      # yamllint disable-line rule:line-length
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          path: |
            a4
            SHA256SUMS
  zizmor:
    runs-on: ubuntu-24.04
    # https://github.com/zizmorcore/zizmor-action#permissions
    permissions: { security-events: write }
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with: { persist-credentials: false }
      # yamllint disable-line rule:line-length
      - uses: zizmorcore/zizmor-action@6599ee8b7a49aef6a770f63d261d214911a7ce02 # v0.6.0
  publish:
    runs-on: ubuntu-24.04
    # https://github.com/softprops/action-gh-release#permissions
    permissions: { contents: write }
    needs: build
    steps:
      # yamllint disable-line rule:line-length
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with: { name: artifact }
      - if: github.ref_type == 'tag'
        env:
          VERSION: ${{ github.ref_name }}
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh
          release
          create
          "--title=$VERSION"
          --draft
          "$VERSION"
          a4
          SHA256SUMS
